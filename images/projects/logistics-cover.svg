<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1B2E"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B6EF5"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B6EF5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5B6EF5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- background grid dots -->
  <g fill="#2A2B3D">
    <circle cx="120" cy="120" r="2.5"/><circle cx="220" cy="120" r="2.5"/><circle cx="320" cy="120" r="2.5"/>
    <circle cx="420" cy="120" r="2.5"/><circle cx="520" cy="120" r="2.5"/><circle cx="620" cy="120" r="2.5"/>
    <circle cx="120" cy="220" r="2.5"/><circle cx="220" cy="220" r="2.5"/><circle cx="320" cy="220" r="2.5"/>
    <circle cx="120" cy="320" r="2.5"/><circle cx="220" cy="320" r="2.5"/>
    <circle cx="1480" cy="780" r="2.5"/><circle cx="1380" cy="780" r="2.5"/><circle cx="1280" cy="780" r="2.5"/>
    <circle cx="1480" cy="680" r="2.5"/><circle cx="1380" cy="680" r="2.5"/>
    <circle cx="1480" cy="580" r="2.5"/>
  </g>

  <!-- route path -->
  <path d="M 220 650 Q 420 500 560 560 T 900 420 Q 1080 350 1180 250 T 1400 180"
        fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round" opacity="0.85"/>

  <!-- waypoint nodes -->
  <circle cx="220" cy="650" r="7" fill="#3A3A42"/>
  <circle cx="560" cy="560" r="7" fill="#3A3A42"/>
  <circle cx="900" cy="420" r="7" fill="#3A3A42"/>

  <!-- active / live node with pulse -->
  <circle cx="1180" cy="250" r="90" fill="url(#pulseGrad)"/>
  <circle cx="1180" cy="250" r="46" fill="url(#pulseGrad)"/>
  <circle cx="1180" cy="250" r="10" fill="#5B6EF5"/>
  <circle cx="1180" cy="250" r="10" fill="none" stroke="#EEEEF2" stroke-width="2"/>

  <circle cx="1400" cy="180" r="7" fill="#C084FC"/>

  <!-- shipment box icon near live node -->
  <g transform="translate(1230,150)">
    <rect x="0" y="14" width="64" height="46" rx="4" fill="#16161A" stroke="#3A3A42" stroke-width="2"/>
    <path d="M0 30 L32 14 L64 30" fill="none" stroke="#5B6EF5" stroke-width="2"/>
    <line x1="32" y1="14" x2="32" y2="60" stroke="#3A3A42" stroke-width="2"/>
  </g>

  <!-- floating stat chip -->
  <g transform="translate(120,80)">
    <rect width="220" height="56" rx="10" fill="#14141699" stroke="#2A2B3D" stroke-width="1.5"/>
    <circle cx="30" cy="28" r="6" fill="#34D399"/>
    <text x="50" y="24" fill="#A8A8B8" font-family="Inter, sans-serif" font-size="13">Live shipments</text>
    <text x="50" y="42" fill="#EEEEF2" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700">2,148 active</text>
  </g>
</svg>
