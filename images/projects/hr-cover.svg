<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1B12"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad3)"/>

  <!-- background grid dots -->
  <g fill="#2E241F">
    <circle cx="120" cy="120" r="2.5"/><circle cx="220" cy="120" r="2.5"/><circle cx="320" cy="120" r="2.5"/>
    <circle cx="1480" cy="780" r="2.5"/><circle cx="1380" cy="780" r="2.5"/>
  </g>

  <!-- document card -->
  <g transform="translate(560,140)">
    <rect width="360" height="500" rx="16" fill="#16161A" stroke="#3A3A42" stroke-width="1.5"/>
    <rect x="32" y="40" width="160" height="14" rx="7" fill="#F59E0B66"/>
    <rect x="32" y="68" width="100" height="10" rx="5" fill="#3A3A42"/>

    <g stroke="#3A3A42" stroke-width="1" >
      <line x1="32" y1="110" x2="328" y2="110"/>
    </g>

    <!-- checklist rows -->
    <g font-family="Inter, sans-serif">
      <circle cx="44" cy="148" r="11" fill="#F59E0B22" stroke="#F59E0B" stroke-width="1.5"/>
      <path d="M38 148 l5 5 l9 -10" fill="none" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="68" y="142" width="220" height="11" rx="5.5" fill="#3A3A42"/>

      <circle cx="44" cy="190" r="11" fill="#F59E0B22" stroke="#F59E0B" stroke-width="1.5"/>
      <path d="M38 190 l5 5 l9 -10" fill="none" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="68" y="184" width="180" height="11" rx="5.5" fill="#3A3A42"/>

      <circle cx="44" cy="232" r="11" fill="none" stroke="#EF444499" stroke-width="1.5"/>
      <rect x="68" y="226" width="200" height="11" rx="5.5" fill="#2A2A2E"/>
    </g>

    <line x1="32" y1="280" x2="328" y2="280" stroke="#3A3A42" stroke-width="1"/>

    <!-- mini calendar grid -->
    <g transform="translate(32,310)">
      <rect width="296" height="150" rx="10" fill="#1B1B1F"/>
      <g fill="#3A3A42">
        <circle cx="30" cy="30" r="9"/><circle cx="64" cy="30" r="9"/><circle cx="98" cy="30" r="9"/><circle cx="132" cy="30" r="9"/><circle cx="166" cy="30" r="9"/><circle cx="200" cy="30" r="9"/><circle cx="234" cy="30" r="9"/><circle cx="268" cy="30" r="9"/>
        <circle cx="30" cy="68" r="9"/><circle cx="64" cy="68" r="9"/><circle cx="98" cy="68" r="9"/>
        <circle cx="166" cy="68" r="9" fill="#F59E0B"/>
        <circle cx="200" cy="68" r="9"/><circle cx="234" cy="68" r="9"/><circle cx="268" cy="68" r="9"/>
        <circle cx="30" cy="106" r="9"/><circle cx="64" cy="106" r="9"/><circle cx="98" cy="106" r="9"/><circle cx="132" cy="106" r="9"/><circle cx="166" cy="106" r="9"/><circle cx="200" cy="106" r="9"/><circle cx="234" cy="106" r="9"/><circle cx="268" cy="106" r="9"/>
      </g>
    </g>
  </g>

  <!-- avatar cluster -->
  <g transform="translate(1140,300)">
    <circle cx="0" cy="60" r="42" fill="#F59E0B22" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="60" cy="0" r="42" fill="#EF444422" stroke="#EF4444" stroke-width="2"/>
    <circle cx="60" cy="120" r="42" fill="#5B6EF522" stroke="#5B6EF5" stroke-width="2"/>
  </g>

  <!-- floating chip -->
  <g transform="translate(1060,560)">
    <rect width="230" height="60" rx="12" fill="#14141699" stroke="#2E241F" stroke-width="1.5"/>
    <text x="20" y="25" fill="#A8A8B8" font-family="Inter, sans-serif" font-size="12">Leave approved</text>
    <text x="20" y="44" fill="#EEEEF2" font-family="Space Grotesk, sans-serif" font-size="15" font-weight="700">120 employees</text>
  </g>
</svg>
