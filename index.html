<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alireza Jaberi — Web Developer</title>
  <meta name="description" content="Alireza Jaberi builds fast, scalable web platforms for businesses that need more than a template." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=optional" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page-loader" id="page-loader">
    <div class="loader-logo">alireza<span>.</span></div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- NAV -->
  <nav>
    <div class="container nav-inner">
      <a href="#" class="nav-logo"><span id="nav-logo-text"></span><span>.</span></a>
      <ul class="nav-links" id="nav-links"></ul>
      <a href="#contact" class="nav-cta">Get in touch</a>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <div class="hero-eyebrow" id="hero-eyebrow"></div>
      <h1>
        <span id="hero-title-line1"></span><br>
        <span class="gradient-text" id="hero-title-line2"></span>
      </h1>
      <p class="hero-sub" id="hero-subtitle"></p>
      <div class="hero-actions">
        <a href="#projects" class="btn-primary" id="hero-btn-primary"></a>
        <a href="#about" class="btn-secondary" id="hero-btn-secondary"></a>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </section>

  <!-- MARQUEE -->
  <div class="marquee-wrap">
    <div class="marquee-track" id="marquee-track"></div>
  </div>

  <!-- ABOUT -->
  <section id="about" class="section">
    <div class="container">
      <div class="about-grid">
        <div>
          <p class="section-label anim-fade" id="about-label"></p>
          <h2 class="anim-fade" id="about-title"></h2>
          <div id="about-paragraphs" class="anim-fade"></div>
          <div class="about-skills" id="about-skills"></div>
          <div style="margin-top:2.25rem;">
            <a href="mailto:" class="btn-primary" id="about-btn"></a>
          </div>
        </div>
        <div class="about-photo-wrap anim-fade">
          <div class="about-photo">
            <img id="about-photo-img" alt="Alireza Jaberi"
              onerror="this.style.display='none'; document.getElementById('about-photo-placeholder').style.display='flex';" />
            <div class="about-photo-placeholder" id="about-photo-placeholder" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section id="services" class="section">
    <div class="container">
      <div class="services-header">
        <div>
          <p class="section-label anim-fade" id="services-label"></p>
          <h2 class="anim-fade" id="services-title"></h2>
        </div>
        <p class="section-intro anim-fade" id="services-intro" style="max-width:360px; font-size:0.95rem;"></p>
      </div>
      <div class="services-grid" id="services-grid"></div>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="section">
    <div class="container">
      <div class="projects-header">
        <div>
          <p class="section-label anim-fade" id="projects-label"></p>
          <h2 class="anim-fade" id="projects-title"></h2>
        </div>
        <a href="#contact" class="btn-secondary anim-fade" id="projects-cta"></a>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section id="testimonials" class="section">
    <div class="container">
      <div class="testimonials-header">
        <div>
          <p class="section-label anim-fade" id="testimonials-label"></p>
          <h2 class="anim-fade" id="testimonials-title" style="margin-bottom:0;"></h2>
        </div>
      </div>
      <div class="testimonial-carousel anim-fade">
        <div class="testimonial-viewport">
          <div class="testimonial-track" id="testimonial-track"></div>
        </div>
        <div class="carousel-controls" id="carousel-controls">
          <button class="icon-btn" id="carousel-prev" aria-label="Previous testimonial"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="carousel-dots" id="carousel-dots"></div>
          <button class="icon-btn" id="carousel-next" aria-label="Next testimonial"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <div class="container">
      <div class="contact-panel anim-fade">
        <div class="contact-panel-glow"></div>
        <div>
          <div class="contact-availability" id="contact-availability"><span></span></div>
          <p class="section-label" id="contact-label"></p>
          <h2 id="contact-title"></h2>
          <p class="contact-sub" id="contact-subtitle"></p>
          <a href="tel:" class="btn-primary" id="contact-primary-btn"></a>
        </div>
        <div class="contact-card">
          <a href="mailto:" class="contact-row" id="contact-email-row">
            <div class="contact-row-icon"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></div>
            <div>
              <div class="contact-row-label">Email</div>
              <div class="contact-row-value" id="contact-email-value"></div>
            </div>
          </a>
          <a href="tel:" class="contact-row" id="contact-phone-row">
            <div class="contact-row-icon"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.2 2.2z"/></svg></div>
            <div>
              <div class="contact-row-label">Phone</div>
              <div class="contact-row-value" id="contact-phone-value"></div>
            </div>
          </a>
          <a href="#" target="_blank" class="contact-row" id="contact-whatsapp-row">
            <div class="contact-row-icon"><svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M7 17l-2 4 5-4"/></svg></div>
            <div>
              <div class="contact-row-label">WhatsApp</div>
              <div class="contact-row-value">Chat instantly</div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <div>
          <div class="footer-brand-logo" id="footer-logo"></div>
          <p class="footer-tagline" id="footer-tagline"></p>
        </div>
        <div class="footer-links" id="footer-nav-links"></div>
      </div>
      <div class="footer-bottom">
        <span class="footer-copy" id="footer-copy"></span>
        <div class="footer-social">
          <a href="#" aria-label="GitHub"><svg class="icon-inline" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.03A9.6 9.6 0 0 1 12 6.8c.85 0 1.71.11 2.51.33 1.91-1.3 2.75-1.03 2.75-1.03.55 1.37.2 2.39.1 2.64.64.7 1.03 1.6 1.03 2.69 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .27.18.58.69.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg></a>
          <a href="#" aria-label="LinkedIn"><svg class="icon-inline" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="3"/><g fill="var(--bg)"><rect x="5.5" y="9.5" width="2.6" height="9"/><circle cx="6.8" cy="6.3" r="1.6"/><path d="M11 9.5h2.5v1.3h.04c.35-.65 1.2-1.34 2.46-1.34 2.63 0 3.1 1.73 3.1 3.98v5.06h-2.6v-4.48c0-1.07-.02-2.44-1.49-2.44-1.49 0-1.72 1.16-1.72 2.36v4.56H11V9.5z"/></g></svg></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
          onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js';document.head.appendChild(s);"></script>

  <!-- DATA -->
  <script src="js/content.js"></script>
  <script src="js/projects.js"></script>

  <!-- ICONS + RENDER -->
  <script src="js/icons.js"></script>
  <script src="js/render-home.js"></script>
</body>
</html>
